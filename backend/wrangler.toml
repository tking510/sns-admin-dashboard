name = "sns-admin-api"
main = "src/index.js"
compatibility_date = "2024-01-01"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "sns-admin-db"
database_id = "dfcb4267-a238-406d-bb7d-353e955f6d9b"

# R2 Bucket binding (for images)
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "sns-admin-images"

# Environment variables
[vars]
API_VERSION = "v1"

# Secrets (set via wrangler secret put)
# AUTH_USERNAME = "admin"
# AUTH_PASSWORD = "sloten1234"
# CLAUDE_API_KEY = (set via: wrangler secret put CLAUDE_API_KEY)